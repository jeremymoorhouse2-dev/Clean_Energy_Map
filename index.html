<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Canada clean energy map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
    }

    #console {
      position: absolute;
      z-index: 1;
      background: white;
      padding: 12px 14px;
      border-radius: 8px;
      top: 12px;
      left: 12px;
      width: 300px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.15);
      font-family: Arial, sans-serif;
      font-size: 14px;
      max-height: 85vh;
      overflow-y: auto;
    }

    #slider {
      width: 100%;
      margin-top: 8px;
      margin-bottom: 12px;
    }

    #year-label {
      font-weight: 700;
    }

    .control-block {
      margin-top: 12px;
    }

    .control-block label {
      display: block;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .control-block select {
      width: 100%;
      padding: 6px;
      font-size: 14px;
    }

    .mapboxgl-popup {
      max-width: 320px;
    }

    .mapboxgl-popup-content {
      font-family: Arial, sans-serif;
      font-size: 13px;
      line-height: 1.4;
      padding: 10px 12px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="console">
    <div><strong>Year:</strong> <span id="year-label">2015</span></div>
    <input id="slider" type="range" min="2015" max="2025" step="1" value="2015">

    <div class="control-block">
      <label for="segment-select">Technology Segment</label>
      <select id="segment-select">
        <option value="all">All segments</option>
      </select>
    </div>

    <div class="control-block">
      <label for="subtype-select">Technology Sub-Type</label>
      <select id="subtype-select">
        <option value="all">All sub-types</option>
      </select>
    </div>
  </div>

  <script>
    mapboxgl.accessToken = 'pk.eyJ1Ijoiam1vb3Job3VzZSIsImEiOiJjbW13YWVoenYydXQ1MnJwbGVlemRxdzdtIn0.6TPYi4u6gPKJmjUrXj4Orw';

    const SOURCE_ID = 'projects';
    const SOURCE_LAYER = 'MapboxTest1-110hj5';
    const LAYER_ID = 'projects-layer';

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/jmoorhouse/cmmwbpvro006k01sw4ubt7xmf',
      center: [-98, 57],
      zoom: 2.8
    });

    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    function extractYearExpression() {
      return ['to-number', ['slice', ['to-string', ['get', 'Commissioned Date']], 0, 4]];
    }

    function buildFilter() {
      const year = parseInt(document.getElementById('slider').value, 10);
      const segment = document.getElementById('segment-select').value;
      const subtype = document.getElementById('subtype-select').value;

      const filters = [
        ['has', 'Commissioned Date'],
        ['<=', extractYearExpression(), year]
      ];

      if (segment !== 'all') {
        filters.push(['==', ['get', 'Technology_Segment'], segment]);
      }

      if (subtype !== 'all') {
        filters.push(['==', ['get', 'Technology_Sub_Type'], subtype]);
      }

      return ['all', ...filters];
    }

    function applyFilters() {
      if (!map.getLayer(LAYER_ID)) return;
      map.setFilter(LAYER_ID, buildFilter());
    }

    function getLoadedFeatures() {
      try {
        return map.querySourceFeatures(SOURCE_ID, { sourceLayer: SOURCE_LAYER });
      } catch (err) {
        console.error('Could not query source features:', err);
        return [];
      }
    }

    function uniqueSorted(values) {
      return [...new Set(values.filter(v => v !== null && v !== undefined && v !== ''))].sort((a, b) =>
        String(a).localeCompare(String(b))
      );
    }

    function populateSegmentOptions() {
      const segmentSelect = document.getElementById('segment-select');
      const features = getLoadedFeatures();

      const segments = uniqueSorted(
        features.map(f => f.properties['Technology_Segment'])
      );

      segmentSelect.innerHTML = '<option value="all">All segments</option>';

      segments.forEach(segment => {
        const option = document.createElement('option');
        option.value = segment;
        option.textContent = segment;
        segmentSelect.appendChild(option);
      });
    }

    function populateSubtypeOptions() {
      const segment = document.getElementById('segment-select').value;
      const subtypeSelect = document.getElementById('subtype-select');
      const features = getLoadedFeatures();

      let filtered = features;

      if (segment !== 'all') {
        filtered = features.filter(f => f.properties['Technology_Segment'] === segment);
      }

      const subtypes = uniqueSorted(
        filtered.map(f => f.properties['Technology_Sub_Type'])
      );

      subtypeSelect.innerHTML = '<option value="all">All sub-types</option>';

      subtypes.forEach(subtype => {
        const option = document.createElement('option');
        option.value = subtype;
        option.textContent = subtype;
        subtypeSelect.appendChild(option);
      });
    }

    map.on('load', () => {
      map.addSource(SOURCE_ID, {
        type: 'vector',
        url: 'mapbox://jmoorhouse.crmluibz'
      });

      map.addLayer({
        id: LAYER_ID,
        type: 'circle',
        source: SOURCE_ID,
        'source-layer': SOURCE_LAYER,
        paint: {
          'circle-radius': [
            'match',
            ['get', 'Technology_Segment'],
            'electricity_generation', 7,
            'buildings', 6,
            'charging', 5,
            'battery_storage', 6,
            5
          ],
          'circle-color': [
            'match',
            ['get', 'Technology_Segment'],
            'electricity_generation', '#1f78b4',
            'buildings', '#33a02c',
            'charging', '#ff7f00',
            'battery_storage', '#6a3d9a',
            '#666666'
          ],
          'circle-opacity': 0.9,
          'circle-stroke-width': 1,
          'circle-stroke-color': '#ffffff'
        },
        filter: [
          'all',
          ['has', 'Commissioned Date'],
          ['<=', extractYearExpression(), 2015]
        ]
      });

      const slider = document.getElementById('slider');
      const yearLabel = document.getElementById('year-label');
      const segmentSelect = document.getElementById('segment-select');
      const subtypeSelect = document.getElementById('subtype-select');

      slider.addEventListener('input', (e) => {
        yearLabel.textContent = e.target.value;
        applyFilters();
      });

      segmentSelect.addEventListener('change', () => {
        populateSubtypeOptions();
        subtypeSelect.value = 'all';
        applyFilters();
      });

      subtypeSelect.addEventListener('change', () => {
        applyFilters();
      });

      const popup = new mapboxgl.Popup({
        closeButton: false,
        closeOnClick: false
      });

      map.on('mouseenter', LAYER_ID, () => {
        map.getCanvas().style.cursor = 'pointer';
      });

      map.on('mouseleave', LAYER_ID, () => {
        map.getCanvas().style.cursor = '';
        popup.remove();
      });

      map.on('mousemove', LAYER_ID, (e) => {
        const feature = e.features[0];
        const coordinates = feature.geometry.coordinates.slice();
        const p = feature.properties;

        const projectName = p['Project Name'] || 'Unnamed project';
        const owner = p['Owner'] || 'Not listed';
        const technology = p['Technology'] || 'Not listed';
        const segment = p['Technology_Segment'] || 'Not listed';
        const subtype = p['Technology_Sub_Type'] || 'Not listed';
        const capacity = p['Capacity'] || '';
        const unit = p['Unit'] || '';
        const status = p['Status'] || 'Not listed';
        const commissionedDate = p['Commissioned Date'] || 'Not listed';

        const capacityDisplay =
          capacity && unit ? `${capacity} ${unit}` :
          capacity ? capacity :
          'Not listed';

        popup
          .setLngLat(coordinates)
          .setHTML(`
            <div>
              <div style="font-weight:700; font-size:14px; margin-bottom:6px;">
                ${projectName}
              </div>
              <div><strong>Owner:</strong> ${owner}</div>
              <div><strong>Technology:</strong> ${technology}</div>
              <div><strong>Segment:</strong> ${segment}</div>
              <div><strong>Sub-Type:</strong> ${subtype}</div>
              <div><strong>Capacity:</strong> ${capacityDisplay}</div>
              <div><strong>Status:</strong> ${status}</div>
              <div><strong>Commissioned Date:</strong> ${commissionedDate}</div>
            </div>
          `)
          .addTo(map);
      });

      map.once('idle', () => {
        populateSegmentOptions();
        populateSubtypeOptions();
        applyFilters();
      });
    });

    map.on('error', (e) => {
      console.error('Map error:', e.error);
    });
  </script>
</body>
</html>
